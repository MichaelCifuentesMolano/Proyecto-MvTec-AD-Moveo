# config/tracking.yaml
# =====================
# Closed-loop visual tracking validation (main_tracking.py).
#
# FLAT schema mirroring the TrackingConfig dataclass in main_tracking.py.
# The previous nested version (camera/detector/control sections) lives in
# config/legacy/ and was never actually loaded by the code.

# --- I/O -------------------------------------------------------------------
deploy_results_dir: "results/deploy"
results_dir: "results/tracking"
video_dir: "results/tracking/video_logs"

# --- Engine selection (default: top-1 of final_embedded_rank.csv) -----------
engine_path: null        # explicit .engine path overrides the ranking
candidate_id: null       # pick a specific candidate id from the ranking
precision: null          # filter by precision ('fp16' | 'int8')
rank_index: 0            # 0 = best ranked artifact

# --- Camera / video source ---------------------------------------------------
# int = camera device id (0 = first camera); string = video file path;
# 'mock' is selected via --source mock on the CLI.
source: 0
source_fps: null
resolution: [640, 480]
max_frames: 1500         # ~50 s at 30 fps

# --- Detector / tracker -------------------------------------------------------
input_shape: [1, 3, 224, 224]
score_threshold: 0.5
tracker_algorithm: "kcf"
reinit_every: 10
lost_threshold: 0.3
warmup_iters: 20

# --- Control loop -------------------------------------------------------------
controller:
  type: "pid"
  kp: 0.6
  ki: 0.0
  kd: 0.05
  max_pan_deg_s: 60.0
  max_tilt_deg_s: 60.0
  deadband_px: 8

# --- Scenarios ------------------------------------------------------------------
scenarios: ["nominal", "occlusion", "low_light", "motion_blur", "gaussian_noise"]

# --- Failure thresholds -----------------------------------------------------------
min_confidence_for_track: 0.25
max_consecutive_lost: 30

# --- Ground truth (optional, enables IoU / pixel-error metrics) --------------------
ground_truth_path: null

# --- Profiling ----------------------------------------------------------------------
energy_sample_hz: 10.0

# --- Output behavior -----------------------------------------------------------------
record_video: true
annotate: true
fail_fast: false
