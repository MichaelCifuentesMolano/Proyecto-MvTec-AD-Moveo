# config/device.yaml
# ===================
# Jetson Orin Nano hardware and runtime settings.
#
# This file centralises every device-specific knob so that the same
# training / deployment code can run unmodified on a workstation by
# swapping only this config.
#
# Jetson Orin Nano specifications (8 GB module, reference values):
#   GPU       : 1024-core Ampere  (SM 8.7)
#   CPU       : 6-core Cortex-A78AE  @ up to 1.5 GHz
#   RAM       : 8 GB LPDDR5X unified (CPU + GPU shared)
#   Storage   : NVMe SSD recommended (eMMC 32 GB base)
#   TDP       : 7 W (MAXN) / 5 W (10W mode)
#   JetPack   : 5.1.2  (L4T R35.3)

# ─────────────────────────────────────────────────────────────────────────
# Target hardware identity
# ─────────────────────────────────────────────────────────────────────────
device:
  name:           jetson_orin_nano_8gb
  gpu_id:         0             # CUDA device index.
  arch:           aarch64
  jetpack:        "5.1.2"
  l4t:            "R35.3"
  sm_version:     "8.7"         # Ampere compute capability.

# ─────────────────────────────────────────────────────────────────────────
# Power / thermal management
# ─────────────────────────────────────────────────────────────────────────
power:
  # NVP model: MAXN (15 W), 10W, 7W.  Applied via: sudo nvpmodel -m <id>
  nvpmodel:       0             # 0 = MAXN (maximum performance).

  # jetson_clocks: lock clocks to maximum for reproducible benchmarks.
  # Applied via: sudo jetson_clocks
  jetson_clocks:  true

  # Thermal throttling guard: pause inference if GPU temp > limit (°C).
  thermal_limit_c: 85
  thermal_check_interval_s: 5.0

# ─────────────────────────────────────────────────────────────────────────
# Memory management
# ─────────────────────────────────────────────────────────────────────────
memory:
  # Unified memory budget for model + activations (MB).
  # Remaining is left for OS, camera buffers, ROS if applicable.
  model_budget_mb: 2048

  # PyTorch CUDA allocator settings (set as env vars at startup).
  cuda_malloc_async: true           # Enable async allocator (reduces fragmentation).
  max_split_size_mb: 256            # Prevent large-block fragmentation.

  # Swap (if NVMe available — improves OOM robustness).
  swap_enabled:  false
  swap_size_gb:  4

  # Pin memory for DataLoader (false on Jetson — unified mem, no gain).
  pin_memory: false

# ─────────────────────────────────────────────────────────────────────────
# TensorRT export
# ─────────────────────────────────────────────────────────────────────────
tensorrt:
  precision:          int8          # fp32 | fp16 | int8
  workspace_gb:       1.0           # TensorRT optimisation workspace.
  calibration_batches: 100          # INT8 entropy-calibration batch count.
  calibration_cache:  "cache/trt_int8_calibration.cache"
  onnx_opset:         17            # ONNX opset supported by TRT on JetPack 5.x
  strict_types:       false         # Allow TRT to mix precisions for speed.
  dynamic_shapes:     false         # Static shapes → faster on Jetson.

  # Input shape for engine optimisation [N, C, H, W].
  input_shape: [1, 3, 256, 256]

  # Engine file suffix (precision is appended automatically).
  engine_dir: "models/trt_engines"

# ─────────────────────────────────────────────────────────────────────────
# ONNX export
# ─────────────────────────────────────────────────────────────────────────
onnx:
  opset:          17
  simplify:       true            # Run onnxsim after export.
  validate:       true            # Run ONNXRuntime forward pass to verify.
  output_dir:     "models/onnx"

# ─────────────────────────────────────────────────────────────────────────
# Runtime benchmark settings
# ─────────────────────────────────────────────────────────────────────────
benchmark:
  n_warmup:       20              # Warm-up inferences before timing.
  n_runs:         200             # Timed inference runs.
  batch_sizes:    [1, 2, 4]       # Throughput sweep batch sizes.

  # Stability test duration.
  stability_duration_s: 60.0
  stability_sample_interval_s: 0.5

  # Cold-start: number of engine reload trials.
  cold_start_trials: 5

  # Output directory for benchmark reports.
  output_dir: "results/benchmarks"

# ─────────────────────────────────────────────────────────────────────────
# DataLoader / inference threading
# ─────────────────────────────────────────────────────────────────────────
threading:
  # DataLoader worker processes.
  # Jetson: keep low (1–2) to avoid LLC thrashing with 6 cores.
  num_workers:        2
  prefetch_factor:    2

  # Inter-op / intra-op parallelism for CPU-bound ORT sessions.
  ort_inter_op_threads: 2
  ort_intra_op_threads: 4

  # CUDA streams for overlapping copy and compute.
  n_cuda_streams:     1           # 1 = safe default; 2 for copy-compute overlap.

# ─────────────────────────────────────────────────────────────────────────
# Sysfs paths (Jetson-specific; empty on non-Jetson hardware)
# ─────────────────────────────────────────────────────────────────────────
sysfs:
  gpu_devfreq:    "/sys/devices/gpu.0/devfreq/gpu.0/cur_freq"
  gpu_devfreq_max: "/sys/devices/gpu.0/devfreq/gpu.0/max_freq"
  thermal_base:   "/sys/class/thermal"
  emc_freq:       "/sys/kernel/nvpmodel_emc_cap/emc_iso_cap"
  cpu_freq_base:  "/sys/devices/system/cpu/cpu{i}/cpufreq/scaling_cur_freq"
  power_sensor:   "/sys/bus/i2c/drivers/ina3221x/6-0040/iio:device0"

# ─────────────────────────────────────────────────────────────────────────
# Environment variables set at process start
# ─────────────────────────────────────────────────────────────────────────
env:
  CUDA_DEVICE_MAX_CONNECTIONS: "1"
  CUBLAS_WORKSPACE_CONFIG:     ":4096:8"   # Required for deterministic matmul.
  PYTORCH_CUDA_ALLOC_CONF:     "max_split_size_mb:256"
  OMP_NUM_THREADS:             "4"
  OPENBLAS_NUM_THREADS:        "4"
  MKL_NUM_THREADS:             "4"
  # Disable TF32 for reproducibility (has no effect on Ampere in INT8 path).
  NVIDIA_TF32_OVERRIDE:        "0"
