# config/search.yaml
# ===================
# NSGA-II multi-objective neural architecture + quantization search.
#
# SCHEMA: flat keys matching main_search.SearchConfig. The old nested schema
# (algorithm:/operators:/…) is still parsed for backwards compatibility, but
# this file is the ground truth actually consumed by main_search.py.
#
# Objectives (all minimised internally — signs applied by the engine):
#   neg_auroc     : -AUROC  (maximise AUROC)
#   latency_ms    : warm inference latency on the target device
#   peak_ram_mb   : peak resident memory during inference
#   energy_mj     : energy per inference (power x latency integration)

# ── I/O ───────────────────────────────────────────────────────────────────
splits_dir:  data/splits
results_dir: results/search
category:    bottle            # MVTec AD category to optimise for.

# ── Reproducibility ──────────────────────────────────────────────────────
seed: 42

# ── NSGA-II hyperparameters ──────────────────────────────────────────────
population_size: 40
n_generations:   50
crossover_prob:  0.90
mutation_prob:   null          # null -> 1 / genome_length
tournament_size: 2

# Hypervolume reference point (neg_auroc, latency_ms, peak_ram_mb, energy_mj).
# null -> derived from the fitness penalty values (guaranteed dominated).
hv_reference: null

# ── Compute / runtime ────────────────────────────────────────────────────
device: cuda                   # falls back to cpu with a warning if no CUDA
n_workers: 1                   # engine evaluates serially; >1 only warns
top_k: 5

# ── Resume ───────────────────────────────────────────────────────────────
resume_from: null              # e.g. results/search/latest_checkpoint
force_finalize: false          # protect final artifacts on 0-gen resumes

# ── Search space (must match src.nas.search_space dataclasses) ───────────
search_space:
  arch:
    families:    [autoencoder, unet, feature_recon, student_teacher, patch_cnn]
    input_sizes: [128, 192, 224, 256]
    channels:    [16, 24, 32, 48, 64, 96, 128, 192, 256]
    kernels:     [3, 5, 7]
    blocks:      [conv, ds, ir]
    bottlenecks: [0.5, 1.0, 2.0, 4.0, 6.0]
    attentions:  [none, se, eca, spatial, cbam]
    min_stages:  2
    max_stages:  5
  quant:
    weight_bits: [4, 6, 8]
    act_bits:    [4, 6, 8]
    allow_mixed_precision: true
    allow_asymmetric:      true
    allow_per_channel:     true

# ── Fitness evaluator (must match src.nas.fitness.FitnessConfig) ─────────
fitness:
  eval_split: test

  # Quick training during search (small budget; full retrain happens later).
  n_search_epochs:   5
  max_train_samples: 500
  search_batch_size: 8
  search_lr:         1.0e-3

  # Hardware profiling.
  n_profiling_warmup: 10
  n_profiling_iters:  30
  # Energy backend: "auto" | "tegrastats" | "sysfs" | "nvml" | "noop".
  #   PC with NVIDIA GPU -> nvml  (pip install pynvml)
  #   Jetson             -> auto  (tegrastats / sysfs)
  energy_backend: nvml

  # Hard constraints.
  max_params_m: 20.0

  # Timeouts (seconds).
  train_timeout_seconds:   600.0
  profile_timeout_seconds: 120.0
